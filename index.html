<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Cuisine | Authentic Taste</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
--gold:#C9A84C;
--light-gold:#FFD700;
--dark:#0a0a0a;
--darker:#050505;
--glass:rgba(0,0,0,0.7);
--border:rgba(201,168,76,0.4);
--whatsapp:#25D366;
}

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{background:var(--dark);color:#fff;font-family:'Poppins';}

.delivery-bar{background:var(--gold);color:black;text-align:center;padding:12px;font-weight:800;position:sticky;top:0;z-index:1000;}

.hero{height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;
background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),url('hero.png');background-size:cover;}

.section-title{font-family:'Playfair Display';color:var(--light-gold);font-size:2.5rem;text-align:center;margin:50px 0;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}

.card{background:var(--glass);padding:20px;border-radius:10px;border:1px solid var(--border);}

.price-row{display:flex;justify-content:space-between;margin-top:8px;}

.order-btn{
display:inline-block;
margin-top:10px;
background:#25D366;
color:#fff;
padding:6px 12px;
border-radius:5px;
text-decoration:none;
font-size:0.85rem;
}

.call-fixed{
position:fixed;
bottom:90px;
right:20px;
background:black;
color:white;
padding:12px 18px;
border-radius:50px;
text-decoration:none;
z-index:2000;
}

.wa-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px 20px;border-radius:50px;}

footer{background:#050505;padding:40px;text-align:center;}
</style>

</head>

<body>

<div class="delivery-bar">FREE HOME DELIVERY IN KHURRIANWALA</div>

<section class="hero">
<h1>Star Cuisine</h1>
</section>

<section>
<h2 class="section-title">Desi Menu</h2>
<div class="grid">

<div class="card">
<h3>Special Chicken Karahi</h3>
<div class="price-row"><span>Full</span><span>1700</span></div>
<div class="price-row"><span>Half</span><span>900</span></div>

<a href="https://wa.me/923356604671?text=I want to order Special Chicken Karahi"
class="order-btn">Order Now</a>

</div>

<div class="card">
<h3>Premium Beef Karahi</h3>
<div class="price-row"><span>Full</span><span>2200</span></div>
<div class="price-row"><span>Half</span><span>1200</span></div>

<a href="https://wa.me/923356604671?text=I want to order Premium Beef Karahi"
class="order-btn">Order Now</a>

</div>

</div>
</section>

<footer>

<p>Main Faisalabad Road, Khurrianwala</p>

<iframe 
src="https://www.google.com/maps?q=Khurrianwala&output=embed"
width="100%" height="250" style="border:0;margin-top:10px;">
</iframe>

<p>© Star Cuisine</p>

</footer>

<a href="tel:+923356604671" class="call-fixed">Call Now</a> <a href="https://wa.me/923356604671" class="wa-btn">WhatsApp</a>

</body>
</html>
